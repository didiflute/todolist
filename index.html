<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="待办清单">
<meta name="theme-color" content="#fef7f0">
<link rel="apple-touch-icon" href="./icon.png">
<link rel="icon" type="image/png" href="./icon.png">
<title>待办清单</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fef7f0;--sf:#fff;--sa:#f9f1e8;
  --tx:#2d3048;--ts:#6b6d82;--tm:#a8aabe;--bd:#ede5da;
  --or:#f47d4a;--orL:#fdf0e8;
  --bl:#5c7cba;--blL:#e8edf6;
  --gn:#6aab8e;--gnL:#e6f2ec;
  --pk:#d97ba2;--pkL:#f8ecf1;
  --pp:#8b7ec7;--ppL:#eeeaf6;
  --tl:#5bbcbf;--tlL:#e5f4f4;
  --nv:#2d3048;--dn:#6aab8e;
  --ur:#e06930;--urBg:#fdf0e8;
  --qk:#f4b24a;--qkBg:#fef6e6;
  --dp:#5c7cba;--dpBg:#e8edf6;
  --hb:#6aab8e;--hbL:#e6f2ec;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
input,button,textarea{font-family:inherit}input::placeholder{color:var(--tm)}
::-webkit-scrollbar{display:none}button{border:none;background:none;cursor:pointer}
.app{max-width:430px;margin:0 auto;min-height:100vh}

.hd{padding:max(env(safe-area-inset-top),48px) 20px 16px;background:var(--or);border-radius:0 0 28px 28px;color:#fff;position:relative;overflow:hidden}
.hd::after{content:'';position:absolute;top:-40px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.1)}
.hd::before{content:'';position:absolute;bottom:-20px;left:40px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.07)}
.hd h1{font-size:24px;font-weight:800;position:relative;z-index:1}
.hd .sub{font-size:13px;opacity:.85;margin-top:4px;position:relative;z-index:1}
.hd-row{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1}
.hd-habits{background:var(--gn)}.hd-ideas{background:var(--pp)}.hd-list{background:var(--bl)}
.ct{padding:12px 16px 170px}

/* Notification banner */
.notif{background:linear-gradient(135deg,#e06930,#f47d4a);border-radius:16px;padding:12px 14px;margin-bottom:10px;color:#fff;position:relative;overflow:hidden;animation:notifIn .4s ease}
.notif::after{content:'';position:absolute;top:-15px;right:-8px;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.1)}
.notif-row{display:flex;align-items:center;gap:10px;position:relative;z-index:1}
.notif-dismiss{background:rgba(255,255,255,.25);border:none;border-radius:10px;color:#fff;font-size:11px;font-weight:700;padding:5px 12px;cursor:pointer}
@keyframes notifIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* Tomorrow warning */
.tmr-warn{background:var(--qkBg);border:1.5px solid #f0dfc0;border-radius:12px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#c89020;animation:notifIn .4s ease .1s both}

.ll{display:flex;gap:0;margin-top:4px}
.sb{width:52px;flex-shrink:0;display:flex;flex-direction:column;gap:4px;padding-top:4px}
.si{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border-radius:12px;cursor:pointer;transition:all .15s;position:relative}
.si.on{background:var(--sf);box-shadow:0 2px 6px rgba(45,48,72,.06)}
.si .se{font-size:18px}.si .sl{font-size:8px;font-weight:700;color:var(--tm)}.si.on .sl{color:var(--tx)}
.si .scn{position:absolute;top:2px;right:2px;font-size:7px;font-weight:800;background:var(--or);color:#fff;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.lm{flex:1;min-width:0;padding-left:8px}
.er{display:flex;gap:4px;margin-bottom:8px}
.ep{font-size:10px;font-weight:700;padding:4px 8px;border-radius:10px;border:1.5px solid var(--bd);color:var(--tm);transition:all .12s}

.sc{font-size:13px;font-weight:700;padding:18px 0 10px;display:flex;align-items:center;gap:8px}

.tk{padding:10px 12px;margin-bottom:6px;border-radius:14px;background:var(--sf);box-shadow:0 2px 6px rgba(45,48,72,.04);border-left:4px solid transparent;transition:all .15s}
.tk.d{opacity:.4}
.tk-top{display:flex;align-items:flex-start;gap:10px}
.tk-text{font-size:13px;line-height:1.55;font-weight:500}
.tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;align-items:center}
.tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;cursor:pointer;position:relative;transition:all .1s;user-select:none;-webkit-user-select:none}
.tag:active{transform:scale(.95)}
.dd{position:absolute;top:100%;left:0;margin-top:4px;background:var(--sf);border-radius:12px;box-shadow:0 8px 24px rgba(45,48,72,.12);padding:6px;z-index:80;min-width:100px;display:flex;flex-direction:column;gap:2px}
.dd-i{padding:6px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.dd-i:active{background:var(--sa)}.dd-i.on{background:var(--orL);color:var(--or)}

.cb{width:20px;height:20px;border-radius:50%;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;border:2px solid var(--bd);transition:all .2s}
.cb.ck{border:none;background:var(--dn)}

.hc{padding:14px 16px;margin-bottom:8px;background:var(--sf);border-radius:16px;box-shadow:0 2px 8px rgba(45,48,72,.04)}
.hbtn{width:36px;height:36px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:18px}
.hbtn.d{background:var(--hb);color:#fff}.hbtn:not(.d){background:var(--sa)}
.wb{height:5px;border-radius:3px;transition:background .3s}
.hm{background:var(--sf);border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(45,48,72,.04)}
.hx{width:8px;height:8px;border-radius:2px;display:inline-block}

.ib{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:8px 16px;background:linear-gradient(transparent 0%,var(--bg) 35%);z-index:50}
.iw{display:flex;align-items:center;gap:8px;border-radius:24px;padding:4px 4px 4px 18px;background:var(--sf);box-shadow:0 4px 16px rgba(45,48,72,.08)}
.iw input{flex:1;border:none;outline:none;font-size:14px;background:transparent;padding:10px 0;color:var(--tx);font-weight:500}
.snb{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s}

.bt{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--sf);border-top:1px solid var(--bd);display:flex;justify-content:space-around;padding:8px 0 max(env(safe-area-inset-bottom),20px);z-index:100}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 16px}.tab span{font-size:10px;font-weight:600}

.mo-bg{position:fixed;inset:0;background:rgba(45,48,72,.2);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.mo{background:var(--sf);border-radius:24px 24px 0 0;width:100%;max-width:430px;padding:24px 20px 40px;max-height:75vh;overflow-y:auto}
.mo h2{font-size:18px;font-weight:800}.mo label{font-size:11px;color:var(--ts);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.mo-input{width:100%;padding:10px 14px;border:2px solid var(--bd);border-radius:14px;font-size:13px;outline:none;background:var(--bg);box-sizing:border-box}
.mo-btn{padding:10px 16px;border-radius:14px;font-size:13px;font-weight:600;cursor:pointer}
.tg{width:44px;height:26px;border-radius:13px;cursor:pointer;padding:3px;transition:background .2s;display:flex;align-items:center}
.tg-k{width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.15);transition:transform .2s}
.to{position:fixed;top:max(env(safe-area-inset-top),40px);left:50%;transform:translateX(-50%) translateY(-10px);background:var(--nv);color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:all .25s;pointer-events:none;box-shadow:0 4px 16px rgba(45,48,72,.2)}
.to.s{opacity:1;transform:translateX(-50%) translateY(0)}
.br{background:var(--qkBg);border:1.5px solid #f0dfc0;border-radius:16px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:600;color:#a08030}
.br button{font-size:11px;padding:6px 16px;border-radius:14px;background:var(--or);color:#fff;font-weight:700}
.ir{display:flex;align-items:center;gap:12px;padding:14px 16px;margin-bottom:8px;background:var(--sf);border-radius:16px;box-shadow:0 2px 8px rgba(45,48,72,.04)}
.eb{font-size:9px;padding:3px 8px;border-radius:10px;border:1.5px solid var(--bd);color:var(--ts);font-weight:600;transition:all .12s}
@keyframes sp{to{transform:rotate(360deg)}}
.spin{width:18px;height:18px;border:2.5px solid var(--bd);border-top-color:var(--or);border-radius:50%;animation:sp .5s linear infinite}
.dd-overlay{position:fixed;inset:0;z-index:70}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="to" id="toast"></div>
<script>
const SK={t:'wt_tasks',h:'wt_habits',s:'wt_set',b:'wt_lb'};
const ld=(k,f)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):f}catch{return f}};
const sv=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const td=()=>new Date().toISOString().slice(0,10);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const DH=[{id:'h1',text:'健身 30 分钟',freq:'daily',streak:0,history:{}},{id:'h2',text:'读书 20 分钟',freq:'daily',streak:0,history:{}}];

let S={tab:'today',tasks:ld(SK.t,[]),habits:ld(SK.h,DH),set:ld(SK.s,{apiKey:'',notifs:false}),
  catF:'all',engF:null,showDone:false,showSet:false,input:'',proc:false,picks:[],addH:false,newH:'',hFreq:'daily',dd:null,
  notifDismissed:false,tmrDismissed:false};
function ps(){sv(SK.t,S.tasks);sv(SK.h,S.habits);sv(SK.s,S.set)}

const CATS=[{i:'all',l:'全部',e:'📋',c:'#f47d4a'},{i:'work',l:'工作',e:'💼',c:'#5c7cba'},{i:'study',l:'学习',e:'📖',c:'#8b7ec7'},{i:'home',l:'家务',e:'🏠',c:'#6aab8e'},{i:'kids',l:'孩子',e:'👶',c:'#d97ba2'},{i:'shopping',l:'购物',e:'🛒',c:'#5bbcbf'}];
const CL=Object.fromEntries(CATS.map(c=>[c.i,c.l]));
const CC=Object.fromEntries(CATS.map(c=>[c.i,c.c]));
const CE=Object.fromEntries(CATS.map(c=>[c.i,c.e]));
const ENG={urgent:{c:'#e06930',l:'🔥紧急',bg:'#fdf0e8'},quick:{c:'#c89020',l:'⚡快速',bg:'#fef6e6'},deep:{c:'#5c7cba',l:'🧠深度',bg:'#e8edf6'}};
const TABS=[{i:'today',l:'今天',p:'M12 3v1m0 16v1m-8-9H3m18 0h-1m-2.636-5.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z'},{i:'list',l:'清单',p:'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4'},{i:'habits',l:'打卡',p:'M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15'},{i:'ideas',l:'想法',p:'M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z'}];
const WD=['一','二','三','四','五','六','日'],MO=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function gwd(){const n=new Date(),d=n.getDay()||7,m=new Date(n);m.setDate(n.getDate()-d+1);return Array.from({length:7},(_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return x.toISOString().slice(0,10)})}
function gyg(){const now=new Date(),yr=now.getFullYear(),j1=new Date(yr,0,1),sd=j1.getDay()||7,st=new Date(j1);st.setDate(j1.getDate()-(sd-1));const ws=[],cur=new Date(st);let wi=0;while(wi<54){const wk=[];for(let d=0;d<7;d++){wk.push({d:cur.toISOString().slice(0,10),y:cur.getFullYear()===yr,m:cur.getMonth()});cur.setDate(cur.getDate()+1)}ws.push(wk);wi++;if(cur>now&&cur.getFullYear()>yr)break}return ws}
function nbr(){const b=localStorage.getItem(SK.b);if(!b)return true;return(Date.now()-parseInt(b))/864e5>=7}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('s');setTimeout(()=>t.classList.remove('s'),2500)}
function ic(p,s=22,c='var(--tm)',w=1.8){return`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"><path d="${p}"/></svg>`}
function chk(){return'<svg width="11" height="11" viewBox="0 0 12 12"><path d="M2.5 6l2.5 2.5 4.5-5" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>'}

async function aiP(text){const k=S.set.apiKey;if(!k)return null;try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:`Parse tasks for a bilingual to-do app. Split MULTIPLE tasks. For each:\n- "text": concise\n- "category": "work"|"study"|"home"|"kids"|"shopping"\n- "energy": "urgent"|"quick"|"deep"|null\n- "due": "今天"|"明天"|"周五"|"本周" or null\n- "assignee": "老公" if mentioned, else null\n- "pool": true if "以后"/"someday", else false\nReturn ONLY valid JSON array.`,messages:[{role:'user',content:text}]})});const d=await r.json();return JSON.parse((d.content?.[0]?.text||'[]').replace(/```json|```/g,'').trim())}catch(e){console.error(e);return null}}
async function aiR(){const k=S.set.apiKey;if(!k)return;const a=S.tasks.filter(t=>!t.done&&!t.pool);if(a.length<3)return;try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:'Return JSON array of up to 5 task IDs to prioritize today. ONLY JSON array.',messages:[{role:'user',content:JSON.stringify(a.map(t=>({id:t.id,text:t.text,energy:t.energy,due:t.due})))}]})});const d=await r.json();S.picks=JSON.parse((d.content?.[0]?.text||'[]').replace(/```json|```/g,'').trim());R()}catch{}}

function tgl(id){S.tasks=S.tasks.map(t=>t.id===id?{...t,done:!t.done}:t);ps();R()}
function del(id){S.tasks=S.tasks.filter(t=>t.id!==id);S.dd=null;ps();R()}
function upd(id,p){S.tasks=S.tasks.map(t=>t.id===id?{...t,...p}:t);S.dd=null;ps();R()}
function tglH(id){const today=td();S.habits=S.habits.map(h=>{if(h.id!==id)return h;const was=h.history[today];const hi={...h.history,[today]:!was};let s=0;if(!was){s=1;const dt=new Date();dt.setDate(dt.getDate()-1);while(hi[dt.toISOString().slice(0,10)]){s++;dt.setDate(dt.getDate()-1)}}return{...h,history:hi,streak:!was?s:Math.max(0,h.streak-1)}});ps();R()}
function delH(id){S.habits=S.habits.filter(h=>h.id!==id);ps();R()}
function openDD(tid,f,e){e.stopPropagation();S.dd={id:tid,f};R()}
function closeDD(){S.dd=null;R()}

async function sub(){const txt=S.input.trim();if(!txt)return;if(S.set.apiKey){S.proc=true;R();const parsed=await aiP(txt);S.proc=false;if(parsed?.length){const ns=parsed.map(p=>({id:uid(),text:p.text,category:p.category||'home',energy:p.energy||null,due:p.due||null,assignee:p.assignee||null,done:false,pool:p.pool||S.tab==='ideas',created:td()}));S.tasks=[...ns,...S.tasks];S.input='';ps();R();toast(`✨ 已添加 ${ns.length} 条任务`);return}}
const parts=txt.split(/[，,、。；;！!\n]+|还有|另外|然后/).map(s=>s.trim()).filter(s=>s);const ns=parts.map(p=>({id:uid(),text:p,category:'home',energy:null,due:null,assignee:/老公|他去|让他/.test(p)?'老公':null,done:false,pool:S.tab==='ideas',created:td()}));S.tasks=[...ns,...S.tasks];S.input='';ps();R();toast(`✨ 已添加 ${ns.length} 条任务`)}

function exp(){const d=JSON.stringify({tasks:S.tasks,habits:S.habits,date:td()},null,2);const b=new Blob([d],{type:'application/json'});if(navigator.share&&navigator.canShare){const f=new File([b],`todo-${td()}.json`,{type:'application/json'});if(navigator.canShare({files:[f]})){navigator.share({files:[f],title:'待办备份'}).catch(()=>{});localStorage.setItem(SK.b,Date.now().toString());return}}const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`todo-${td()}.json`;a.click();URL.revokeObjectURL(u);localStorage.setItem(SK.b,Date.now().toString());toast('📦 已导出备份')}
function imp(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.tasks)S.tasks=d.tasks;if(d.habits)S.habits=d.habits;ps();R();toast('✅ 导入成功！')}catch{alert('格式错误')}};r.readAsText(f);e.target.value=''}
function addHA(){if(!S.newH.trim())return;S.habits.push({id:uid(),text:S.newH.trim(),freq:S.hFreq,streak:0,history:{}});S.newH='';S.addH=false;ps();R()}

function sec(emoji,label){return`<div class="sc"><span style="font-size:16px">${emoji}</span>${label}</div>`}
function hdC(){return{today:'',list:' hd-list',habits:' hd-habits',ideas:' hd-ideas'}[S.tab]}

function tkH(t,sc){
  const eg=t.energy?ENG[t.energy]:null;const cc=CC[t.category]||'#f47d4a';const isDD=f=>S.dd&&S.dd.id===t.id&&S.dd.f===f;
  let h=`<div class="tk${t.done?' d':''}" style="border-left-color:${t.done?'transparent':cc}">
    <div class="tk-top"><div style="padding-top:1px" onclick="event.stopPropagation();tgl('${t.id}')"><div class="cb${t.done?' ck':''}">${t.done?chk():''}</div></div>
      <div style="flex:1;min-width:0"><span class="tk-text" style="color:${t.done?'var(--tm)':'var(--tx)'};text-decoration:${t.done?'line-through':'none'}">${esc(t.text)}</span>`;
  if(!t.done){
    h+='<div class="tags">';
    // Category
    h+=`<span class="tag" style="background:${cc}18;color:${cc}" onclick="openDD('${t.id}','cat',event)">${CE[t.category]||'📋'}${CL[t.category]||''}`;
    if(isDD('cat')){h+='<div class="dd">';CATS.filter(c=>c.i!=='all').forEach(c=>{h+=`<div class="dd-i${t.category===c.i?' on':''}" onclick="event.stopPropagation();upd('${t.id}',{category:'${c.i}'})">${c.e} ${c.l}</div>`});h+='</div>'}
    h+='</span>';
    // Energy
    if(eg)h+=`<span class="tag" style="background:${eg.bg};color:${eg.c}" onclick="openDD('${t.id}','eng',event)">${eg.l}`;
    else h+=`<span class="tag" style="background:var(--sa);color:var(--tm)" onclick="openDD('${t.id}','eng',event)">优先级`;
    if(isDD('eng')){h+='<div class="dd">';Object.entries(ENG).forEach(([k,v])=>{h+=`<div class="dd-i${t.energy===k?' on':''}" onclick="event.stopPropagation();upd('${t.id}',{energy:'${k}'})">${v.l}</div>`});h+=`<div class="dd-i${!t.energy?' on':''}" onclick="event.stopPropagation();upd('${t.id}',{energy:null})">无</div></div>`}
    h+='</span>';
    // Due
    if(t.due)h+=`<span class="tag" style="background:${t.due==='今天'?'#fdf0e8':'var(--sa)'};color:${t.due==='今天'?'#e06930':'var(--ts)'}">${t.due}</span>`;
    // Assignee
    h+=`<span class="tag" style="background:${t.assignee?'#e8edf6':'var(--sa)'};color:${t.assignee?'#5c7cba':'var(--tm)'}" onclick="openDD('${t.id}','asg',event)">${t.assignee?'→'+t.assignee:'👤'}`;
    if(isDD('asg')){h+=`<div class="dd"><div class="dd-i${t.assignee?' on':''}" onclick="event.stopPropagation();upd('${t.id}',{assignee:'老公'})">👤 老公</div><div class="dd-i${!t.assignee?' on':''}" onclick="event.stopPropagation();upd('${t.id}',{assignee:null})">自己</div></div>`}
    h+='</span>';
    // More
    h+=`<span class="tag" style="background:var(--sa);color:var(--tm)" onclick="openDD('${t.id}','more',event)">···`;
    if(isDD('more')){h+=`<div class="dd"><div class="dd-i" onclick="event.stopPropagation();upd('${t.id}',{pool:${!t.pool}})">${t.pool?'📋 行动':'💡 想法'}</div><div class="dd-i" style="color:#e06930" onclick="event.stopPropagation();del('${t.id}')">🗑 删除</div></div>`}
    h+='</span></div>';
  }
  h+='</div></div></div>';return h;
}

function hmH(){
  const ws=gyg(),today=td(),mxH=Math.max(S.habits.length,1);
  const iC=['var(--sa)','var(--hbL)','#a8d4bc','var(--hb)'];
  const gc=(d,y)=>{if(!y)return'transparent';let c=0;S.habits.forEach(h=>{if(h.history[d])c++});if(!c)return'#f5ede3';return iC[Math.min(3,Math.ceil(c/mxH*3))]};
  const ms=[];let lm=-1;ws.forEach((w,wi)=>{const m=w[0].m;if(m!==lm&&w[0].y){ms.push({m,wi});lm=m}});
  const all=ws.flat().filter(d=>d.y);const tot=all.reduce((s,d)=>{let c=0;S.habits.forEach(h=>{if(h.history[d.d])c++});return s+c},0);
  let stk=0;const sd=new Date();while(S.habits.length&&S.habits.every(h=>h.history[sd.toISOString().slice(0,10)])){stk++;sd.setDate(sd.getDate()-1)}
  const cz=8,cg=2,rl=16,tw=rl+ws.length*(cz+cg);
  let h=`<div class="hm"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <span style="font-size:14px;font-weight:700">${new Date().getFullYear()} 年</span>
    <div style="display:flex;gap:12px"><span style="font-size:11px;color:var(--ts);font-weight:600"><span style="color:var(--hb)">${tot}</span> 次</span>
    ${stk?`<span style="font-size:11px;color:var(--ts);font-weight:600">🔥<span style="color:var(--or)">${stk}</span>天</span>`:''}</div></div>`;
  h+=`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none"><div style="position:relative;min-width:${tw}px">`;
  h+=`<div style="height:12px;margin-left:${rl}px;position:relative">`;ms.forEach(({m,wi})=>{h+=`<span style="position:absolute;left:${wi*(cz+cg)}px;font-size:8px;color:var(--tm);font-weight:600">${MO[m]}</span>`});h+='</div>';
  for(let r=0;r<7;r++){h+=`<div style="display:flex;align-items:center;gap:${cg}px;margin-top:${r===0?14:cg}px"><span style="width:${rl}px;font-size:7px;color:var(--tm);text-align:right;padding-right:3px;line-height:${cz}px;font-weight:600">${r===0?'一':r===2?'三':r===4?'五':''}</span>`;
    ws.forEach(w=>{const c=w[r];if(!c){h+=`<span style="width:${cz}px;height:${cz}px;display:inline-block"></span>`;return}h+=`<span class="hx" style="background:${gc(c.d,c.y)}${c.d===today?';outline:2px solid var(--or);outline-offset:1px':''}"></span>`});h+='</div>'}
  h+='</div></div>';
  h+=`<div style="display:flex;align-items:center;gap:3px;margin-top:8px;justify-content:flex-end"><span style="font-size:8px;color:var(--tm);font-weight:600">少</span>`;
  ['#f5ede3','var(--hbL)','#a8d4bc','var(--hb)'].forEach(c=>{h+=`<span style="width:8px;height:8px;border-radius:2px;background:${c};display:inline-block"></span>`});
  h+='<span style="font-size:8px;color:var(--tm);font-weight:600">多</span></div></div>';return h;
}

  else if(S.tab==='list'){

      h+=`<div class="si${S.catF===c.i?' on':''}" onclick="S.catF='${c.i}';R()"><span class="se">${c.e}</span><span class="sl">${c.l}</span>${cnt>0&&c.i!=='all'?`<span class="scn">${cnt}</span>`:''}</div>`});
    h+='</div><div class="lm"><div class="er">';
    Object.entries(ENG).forEach(([k,v])=>{h+=`<button class="ep" style="${S.engF===k?`border-color:${v.c};background:${v.bg};color:${v.c}`:''}" onclick="S.engF=S.engF==='${k}'?null:'${k}';R()">${v.l}</button>`});

  // TABS
  h+='<div class="bt">';TABS.forEach(t=>{const on=S.tab===t.i;
    h+=`<button class="tab" onclick="S.tab='${t.i}';S.dd=null;S.notifDismissed=false;S.tmrDismissed=false;${t.i==='today'?'aiR();':''}R()">
      ${ic(t.p,22,on?'var(--or)':'var(--tm)',on?2:1.8)}
      <span style="color:${on?'var(--or)':'var(--tm)'};font-weight:${on?700:500}">${t.l}</span></button>`});
  h+='</div>';

  // SETTINGS
  if(S.showSet){
    h+=`<div class="mo-bg" onclick="S.showSet=false;R()"><div class="mo" onclick="event.stopPropagation()">

        <input class="mo-input" type="password" value="${S.set.apiKey}" placeholder="sk-ant-..." onchange="S.set.apiKey=this.value;ps()"></div>
      <div style="margin-bottom:24px"><label>数据</label>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="mo-btn" style="flex:1;border:2px solid var(--bd);color:var(--tx)" onclick="exp()">📦 导出</button>
          <label class="mo-btn" style="flex:1;border:2px solid var(--bd);color:var(--tx);display:flex;align-items:center;justify-content:center">📥 导入<input type="file" accept=".json" onchange="imp(event)" style="display:none"></label></div></div>
      <button class="mo-btn" style="border:2px solid #f0dbd7;color:var(--ur)" onclick="if(confirm('确定清除？')){S.tasks=[];S.habits=[...${JSON.stringify(DH)}];ps();R()}">🗑 清除</button>
    </div></div>`;
  }
  document.getElementById('app').innerHTML=h;
  if(S.addH){const ni=document.getElementById('nhi');if(ni)ni.focus()}
}

R();if(S.set.apiKey)aiR();
</script>
